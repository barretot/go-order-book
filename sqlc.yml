version: 2

sql:
  - engine: "postgresql"
    queries: "./internal/store/pg/queries"
    schema: "./migrations"
    gen:
      go:
        emit_json_tags: true
        out: "./internal/store/pg"
        package: "pg"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
